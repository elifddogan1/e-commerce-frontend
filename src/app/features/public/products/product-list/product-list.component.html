<div class="page-wrapper">
  <div class="content-container">

    <!-- Header Section -->
    <header class="list-header">
      <div class="header-text">
        <h2>Tüm Ürünler</h2>
        <p *ngIf="!loading">{{ totalElements }} harika ürün sizi bekliyor</p>
      </div>
      <div class="header-search">
        <span class="p-input-icon-left">
          <i class="pi pi-search"></i>
          <input type="text" pInputText placeholder="Ürünlerde ara..." class="glass-input" />
        </span>
      </div>
    </header>

    <!-- Loading State -->
    <div *ngIf="loading" class="loading-overlay">
      <p-progressSpinner></p-progressSpinner>
    </div>

    <!-- Empty State -->
    <div *ngIf="!loading && products.length === 0" class="glass-panel empty-state">
      <i class="pi pi-search-minus"></i>
      <h3>Sonuç Bulunamadı</h3>
      <p>Arama kriterlerinize uygun ürün bulunmamaktadır.</p>
    </div>

    <!-- Product Grid -->
    <div *ngIf="!loading && products.length > 0" class="product-grid">
      <div *ngFor="let product of products" class="product-card-wrapper">

        <div class="glass-card product-card">
          <!-- Image Section -->
          <div class="card-image" [routerLink]="['/products', product.id]">
            <div class="badge-new">YENİ</div>

            <button class="btn-fav" (click)="$event.stopPropagation(); toggleFavorite(product)">
              <i class="pi pi-heart"></i>
            </button>

            <img
              [src]="product.imageUrl ? product.imageUrl : (product.variants && product.variants[0]?.imageUrl ? product.variants[0].imageUrl : 'assets/no-image.png')"
              [alt]="product.name">
          </div>

          <!-- Info Section -->
          <div class="card-info" [routerLink]="['/products', product.id]">
            <span class="category-tag">Teknoloji</span>
            <h3 class="product-name">{{ product.name }}</h3>
            <p class="product-desc">{{ product.description }}</p>
          </div>

          <!-- Footer Section -->
          <div class="card-footer">
            <div class="price-box">
              <span class="currency">₺</span>
              <span class="amount">{{ product.basePrice | number:'1.2-2' }}</span>
            </div>

            <button class="btn-add-cart" (click)="addToCart(product)" pTooltip="Sepete Ekle" tooltipPosition="left">
              <i class="pi pi-shopping-cart"></i>
            </button>
          </div>
        </div>

      </div>
    </div>

    <!-- Pagination -->
    <div class="glass-panel pagination-panel" *ngIf="!loading && totalElements > 0">
      <p-paginator (onPageChange)="onPageChange($event)" [first]="currentPage * pageSize" [rows]="pageSize"
        [totalRecords]="totalElements" [rowsPerPageOptions]="[25, 50, 100]" styleClass="custom-paginator">
      </p-paginator>
    </div>

  </div>
</div>
