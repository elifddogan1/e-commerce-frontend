<!-- Floating Chat Button -->
<button
  class="chat-fab"
  [class.chat-fab--open]="isOpen"
  (click)="toggleChat()"
  *ngIf="isLoggedIn">
  <i class="pi" [ngClass]="isOpen ? 'pi-times' : 'pi-comment'"></i>
  <span class="fab-pulse" *ngIf="!isOpen"></span>
</button>

<!-- Chat Window -->
<div class="chat-window" [class.chat-window--open]="isOpen" *ngIf="isLoggedIn">

  <!-- Header -->
  <div class="chat-header">
    <div class="chat-header__info">
      <div class="chat-avatar">
        <i class="pi pi-bolt"></i>
      </div>
      <div class="chat-header__text">
        <span class="chat-header__title">AI Asistan</span>
        <span class="chat-header__status">
          <span class="status-dot"></span>
          Çevrimiçi
        </span>
      </div>
    </div>
    <div class="chat-header__actions">
      <button class="header-btn" (click)="clearChat()" title="Sohbeti Temizle">
        <i class="pi pi-refresh"></i>
      </button>
      <button class="header-btn" (click)="toggleChat()" title="Kapat">
        <i class="pi pi-minus"></i>
      </button>
    </div>
  </div>

  <!-- Messages -->
  <div class="chat-messages" #messagesContainer>
    <div
      *ngFor="let msg of messages"
      class="message"
      [ngClass]="{
        'message--user': msg.role === 'user',
        'message--assistant': msg.role === 'assistant',
        'message--system': msg.role === 'system'
      }">

      <!-- Avatar -->
      <div class="message__avatar" *ngIf="msg.role === 'assistant'">
        <i class="pi pi-bolt"></i>
      </div>

      <div class="message__content">
        <div class="message__bubble">
          {{ msg.content }}
        </div>

        <!-- Tool Badges -->
        <div class="message__tools" *ngIf="msg.toolsUsed && msg.toolsUsed.length > 0">
          <span class="tool-badge" *ngFor="let tool of msg.toolsUsed">
            {{ getToolLabel(tool) }}
          </span>
        </div>

        <!-- Timestamp -->
        <span class="message__time">
          {{ msg.timestamp | date:'HH:mm' }}
        </span>
      </div>
    </div>

    <!-- Loading Indicator -->
    <div class="message message--assistant" *ngIf="isLoading">
      <div class="message__avatar">
        <i class="pi pi-bolt"></i>
      </div>
      <div class="message__content">
        <div class="message__bubble message__bubble--typing">
          <div class="typing-dots">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Input Area -->
  <div class="chat-input">
    <input
      #messageInput
      type="text"
      [(ngModel)]="userMessage"
      (keydown)="onKeyDown($event)"
      placeholder="Mesajınızı yazın..."
      [disabled]="isLoading"
      class="chat-input__field" />
    <button
      class="chat-input__send"
      (click)="sendMessage()"
      [disabled]="isLoading || !userMessage.trim()">
      <i class="pi pi-send"></i>
    </button>
  </div>
</div>
