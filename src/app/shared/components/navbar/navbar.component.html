<div class="navbar-container">
    <p-menubar [model]="items" styleClass="custom-menubar">

        <!-- LOGO Bölümü -->
        <ng-template pTemplate="start">
            <div class="brand"
                [routerLink]="authService.isAdmin() ? '/admin/dashboard' : (authService.isSeller() ? '/seller-panel/dashboard' : '/products')">
                <div class="logo-icon">
                    <i class="pi pi-bolt"></i>
                </div>
                <span class="brand-text">FILE STORE</span>
            </div>
        </ng-template>

        <!-- SAĞ TARAF (Arama, Sepet, Profil) -->
        <ng-template pTemplate="end">
            <div class="nav-actions">

                <!-- Arama (Sadece Normal Kullanıcılar ve Ziyaretçiler için) -->
                <div class="search-box" *ngIf="!authService.isSeller() && !authService.isAdmin()">
                    <i class="pi pi-search"></i>
                    <input type="text" pInputText placeholder="Ürün ara..." class="p-inputtext-sm" />
                </div>

                <!-- Sepet (Satıcılar ve Adminler Göremez) -->
                <div class="cart-wrapper" *ngIf="authService.showCartIcon() && !authService.isAdmin()">
                    <button class="nav-btn-icon" routerLink="/cart">
                        <i class="pi pi-shopping-cart"></i>
                        <span class="cart-badge" *ngIf="cartItemCount > 0">{{ cartItemCount }}</span>
                    </button>
                </div>

                <!-- Kullanıcı İşlemleri -->
                <div class="auth-group">
                    <ng-container *ngIf="authService.isLoggedIn(); else guestButtons">

                        <!-- Profil / Panel Butonu -->
                        <button class="nav-btn-profile"
                            [routerLink]="authService.isAdmin() ? '/admin/dashboard' : (authService.isSeller() ? '/seller-panel/dashboard' : '/profile')">
                            <!-- Role Göre Dinamik İkon -->
                            <i
                                [class]="authService.isAdmin() ? 'pi pi-shield' : (authService.isSeller() ? 'pi pi-store' : 'pi pi-user')"></i>

                            <!-- Role Göre Dinamik Metin -->
                            <span class="hidden-mobile">
                                {{ authService.isAdmin() ? 'Admin Paneli' : (authService.isSeller() ? 'Panelim' :
                                'Profilim') }}
                            </span>
                        </button>

                        <!-- Çıkış Butonu -->
                        <button class="nav-btn-logout" (click)="authService.logout()">
                            <i class="pi pi-sign-out"></i>
                        </button>

                    </ng-container>

                    <ng-template #guestButtons>
                        <button class="btn-login" [routerLink]="['/auth/login']">Giriş</button>
                        <button class="btn-register" [routerLink]="['/auth/register']">Kayıt Ol</button>
                    </ng-template>
                </div>

            </div>
        </ng-template>
    </p-menubar>
</div>
